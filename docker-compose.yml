services:
  app:
    image: ghcr.io/nov1ce-lee/mc-website:latest
    restart: always
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/app/prisma/data/dev.db}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      MC_SERVER_IP: ${MC_SERVER_IP}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/public/uploads/archives}
    volumes:
      - sqlite_data:/app/prisma/data
      - uploads_data:/app/public/uploads

volumes:
  sqlite_data:
  uploads_data:
