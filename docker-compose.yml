services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:./data/dev.db
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      MC_SERVER_IP: ${MC_SERVER_IP}
    volumes:
      - sqlite_data:/app/prisma/data
    command: >
      sh -c "mkdir -p /app/prisma/data && npx prisma db push && npm start"

volumes:
  sqlite_data:
